<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pintle Injector Design | Bryan Yeh</title>

  <script>
    history.scrollRestoration = "manual";
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: #0a0a0a;
      color: #f5f5f5;
      scroll-behavior: smooth;
    }

    nav {
      position: fixed;
      width: 100%;
      top: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(8px);
      padding: 18px 10%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-sizing: border-box;
    }

    nav a {
      color: #f5f5f5;
      text-decoration: none;
      font-size: 0.95rem;
      opacity: 0.9;
      transition: 0.2s ease;
    }

    nav a:hover {
      opacity: 1;
    }

    .back {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.14);
      padding: 9px 13px;
      border-radius: 12px;
      text-decoration: none;
      color: #f5f5f5;
      transition: 0.2s ease;
    }

    .back:hover {
      background: rgba(255,255,255,0.06);
      transform: translateY(-2px);
    }

    main {
      padding: 130px 10% 90px;
      max-width: 1150px;
      margin: 0 auto;
    }

    .hero {
      margin-bottom: 36px;
    }

    .eyebrow {
      font-size: 0.9rem;
      color: #8e8e8e;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      font-size: 3rem;
      margin: 0 0 14px 0;
      line-height: 1.05;
    }

    .subtitle {
      color: #a9a9a9;
      max-width: 760px;
      line-height: 1.7;
      font-size: 1.02rem;
      margin-bottom: 22px;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .pill {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.85rem;
      color: #ddd;
    }

    .section-block {
      margin-top: 30px;
      padding: 28px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
      border-radius: 22px;
    }

    .section-block h2 {
      margin: 0 0 12px 0;
      font-size: 1.55rem;
    }

    .section-block p {
      color: #aaa;
      line-height: 1.75;
      max-width: 800px;
    }

    .section-block ul {
      margin: 12px 0 0;
      padding-left: 18px;
      color: #aaa;
      line-height: 1.75;
      max-width: 820px;
    }

    .snapshot-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-top: 18px;
    }

    .snapshot-card {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
      border-radius: 16px;
      padding: 18px;
    }

    .snapshot-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #7f7f7f;
      margin-bottom: 8px;
    }

    .snapshot-value {
      font-size: 0.98rem;
      color: #f3f3f3;
      line-height: 1.5;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 26px;
      align-items: start;
      margin-top: 14px;
    }

    .media-card {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
      border-radius: 18px;
      padding: 14px;
    }

    .media-card img {
      width: 100%;
      display: block;
      border-radius: 12px;
    }

    .caption {
      margin-top: 10px;
      font-size: 0.86rem;
      color: #8a8a8a;
      line-height: 1.5;
    }

    footer {
      text-align: center;
      padding: 50px 10%;
      font-size: 0.8rem;
      color: #666;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ONLY CHANGE IS HERE */
    .logo-item {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      padding: 16px;
      border-radius: 16px;
      background: #d6d6d6;
      border: 1px solid rgba(255,255,255,0.10);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .logo-item img {
      width: 100%;
      max-width: 110px;
      height: 60px;
      object-fit: contain;
    }

  </style>
</head>

<body>
  <nav>
    <a class="back" href="index.html">← Back</a>
    <div style="font-size:0.9rem; color:#8f8f8f;">Project</div>
  </nav>

  <main>
    <section class="hero reveal">
      <div class="eyebrow">Brakes Project</div>
      <h1>Front Brake Rotor Design</h1>
    </section>

    <section class="section-block reveal">
      <h2>Tools and Skills</h2>

      <div class="tools-skills-wrap">
        <div class="tools-box">
          <h3>Tools used in this project</h3>

          <div class="logo-grid">
            <div class="logo-item">
              <img src="./SolidWorks_logo.png">
            </div>

            <div class="logo-item">
              <img src="./ANSYS_logo.png">
            </div>
          </div>

        </div>
      </div>
    </section>
  </main>

  <footer>
    © 2026 Bryan Yeh
  </footer>

  <script>
    const items = document.querySelectorAll(".reveal");

    const observer = new IntersectionObserver(
      (entries, obs) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          entry.target.classList.add("visible");
          obs.unobserve(entry.target);
        });
      },
      { threshold: 0.18 }
    );

    items.forEach((el) => observer.observe(el));
  </script>
</body>
</html>
